version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ae_user
      POSTGRES_PASSWORD: ae_password
      POSTGRES_DB: ae_db
    volumes:
      - ./db/data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ae_user -d ae_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Expose only if needed:
    # ports:
    #   - "5432:5432"

  app:
    build: .
    command: npm run dev
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules   # prevents node_modules from being overwritten
    environment:
      DATABASE_URL: postgresql://ae_user:ae_password@db:5432/ae_db
      ADMIN_API_KEY: devadminkey
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
